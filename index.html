<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Future Signal Predictor ULTRA PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020617;
color:white;
padding:20px;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
width:500px;
height:500px;
background:#2563eb33;
filter:blur(120px);
top:-200px;
right:-200px;
z-index:-1;
animation:moveGlow 8s linear infinite alternate;
}

@keyframes moveGlow{
0%{transform:translate(0,0);}
100%{transform:translate(-100px,100px);}
}

.container{
max-width:1200px;
margin:auto;
}

.title{
text-align:center;
font-size:42px;
font-weight:bold;
margin-bottom:25px;
background:linear-gradient(to right,#38bdf8,#2563eb,#9333ea);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 3s infinite alternate;
}

@keyframes glow{
0%{filter:drop-shadow(0 0 5px #2563eb);}
100%{filter:drop-shadow(0 0 25px #9333ea);}
}

.card{
background:rgba(15,23,42,0.9);
backdrop-filter:blur(10px);
border:1px solid #1e293b;
border-radius:22px;
padding:20px;
margin-bottom:25px;
box-shadow:0 0 20px #00000055;
transition:0.3s;
}

.card:hover{
transform:translateY(-4px);
}

.row{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.box{
flex:1;
min-width:180px;
background:#0f172a;
border:1px solid #1e293b;
border-radius:18px;
padding:20px;
text-align:center;
position:relative;
overflow:hidden;
}

.box::before{
content:'';
position:absolute;
width:100%;
height:4px;
background:linear-gradient(to right,#38bdf8,#9333ea);
top:0;
left:0;
}

.label{
font-size:14px;
color:#94a3b8;
margin-bottom:12px;
}

.value{
font-size:30px;
font-weight:bold;
}

.big{
color:#22c55e;
text-shadow:0 0 10px #22c55e;
}

.small{
color:#ef4444;
text-shadow:0 0 10px #ef4444;
}

.status{
text-align:center;
margin-top:20px;
font-size:15px;
color:#94a3b8;
}

.logic-box{
margin-top:20px;
background:#020617;
border-radius:16px;
padding:15px;
line-height:1.8;
border:1px solid #1e293b;
}

.brain{
margin-top:15px;
font-weight:bold;
color:#38bdf8;
font-size:18px;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:16px;
background:linear-gradient(to right,#2563eb,#9333ea);
font-size:17px;
font-weight:bold;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.02);
opacity:0.9;
}

.recent-box{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:20px;
}

.recent-item{
width:55px;
height:55px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
font-size:18px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

.green-circle{
background:#14532d;
box-shadow:0 0 12px #22c55e;
}

.red-circle{
background:#7f1d1d;
box-shadow:0 0 12px #ef4444;
}

.history-item{
background:#020617;
border:1px solid #1e293b;
padding:18px;
border-radius:16px;
margin-top:12px;
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:10px;
transition:0.3s;
}

.history-item:hover{
transform:translateX(4px);
}

.badge{
padding:7px 14px;
border-radius:30px;
font-size:12px;
font-weight:bold;
}

.green{
background:#14532d;
}

.red{
background:#7f1d1d;
}

.yellow{
background:#78350f;
}

.profit{
color:#22c55e;
}

.loss{
color:#ef4444;
}

.bar-wrap{
margin-top:20px;
}

.bar{
height:20px;
background:#111827;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.bar-fill{
height:100%;
width:0%;
background:linear-gradient(to right,#38bdf8,#22c55e);
transition:1s;
}

.ai-status{
margin-top:20px;
padding:14px;
border-radius:14px;
background:#111827;
border:1px solid #1e293b;
font-size:15px;
line-height:1.7;
}

.footer{
text-align:center;
margin-top:30px;
color:#64748b;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
AI Future Signal Predictor ULTRA PRO
</div>

<div class="card">

<div class="row">

<div class="box">
<div class="label">Next Prediction</div>
<div class="value big" id="prediction">BIG</div>
</div>

<div class="box">
<div class="label">Confidence</div>
<div class="value" id="confidence">0%</div>
</div>

<div class="box">
<div class="label">Market Trend</div>
<div class="value" id="trend">ANALYZING</div>
</div>

<div class="box">
<div class="label">Risk Level</div>
<div class="value" id="risk">LOW</div>
</div>

</div>

<div class="status" id="periodStatus">
Waiting For API...
</div>

<div class="logic-box" id="logicBox">
AI Loading...
</div>

<div class="brain" id="brainPower">
Brain Power: 0%
</div>

<div class="bar-wrap">
AI Accuracy
<div class="bar">
<div class="bar-fill" id="accuracyBar"></div>
</div>
</div>

<div class="recent-box" id="recentResults"></div>

<div class="ai-status" id="aiStatus">
AI Neural Engine Booting...
</div>

<button onclick="loadData()">
Refresh AI Signal
</button>

</div>

<div class="card">

<h2>Signal History</h2>

<div id="history"></div>

</div>

<div class="footer">
AI Predictor PRO • Quantum Neural Analysis
</div>

</div>

<script>

const API_URL =
"https://draw.ar-lottery02.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?pageSize=50&pageNo=1&typeId=1&language=0";

let signalHistory =
JSON.parse(localStorage.getItem("signalHistory")) || [];

let aiBrain =
JSON.parse(localStorage.getItem("aiBrain")) || {

trend:{win:5,loss:2,weight:1},
momentum:{win:5,loss:2,weight:1},
reversal:{win:5,loss:2,weight:1},
pattern:{win:5,loss:2,weight:1},
volatility:{win:5,loss:2,weight:1},
machine:{win:5,loss:2,weight:1}

};

let lastPeriod = null;
let pendingSignal = null;

function saveBrain(){

localStorage.setItem(
"aiBrain",
JSON.stringify(aiBrain)
);

}

function getBigSmall(num){

return Number(num) >= 5
? "BIG"
: "SMALL";

}

function calcWeight(name){

let s = aiBrain[name];

return (
s.win / (s.win+s.loss)
);

}

function updateBrain(name,win){

if(win){

aiBrain[name].win++;

}else{

aiBrain[name].loss++;

}

aiBrain[name].weight =
calcWeight(name);

saveBrain();

}

function analyze(results){

let recent = results.slice(0,25);

let scoreBig = 0;
let scoreSmall = 0;

let logic = [];
let usedStrategies = [];


// ================= TREND =================

let bigCount =
recent.filter(x=>x==="BIG").length;

let smallCount =
recent.filter(x=>x==="SMALL").length;

if(bigCount > smallCount){

scoreBig += 45 * aiBrain.trend.weight;

logic.push("Trend Engine → BIG");

usedStrategies.push({
name:"trend",
prediction:"BIG"
});

}else{

scoreSmall += 45 * aiBrain.trend.weight;

logic.push("Trend Engine → SMALL");

usedStrategies.push({
name:"trend",
prediction:"SMALL"
});

}


// ================= MOMENTUM =================

let streak = 1;

for(let i=0;i<recent.length-1;i++){

if(recent[i] === recent[i+1]){

streak++;

}else{

break;

}

}

if(streak >= 3){

if(recent[0] === "BIG"){

scoreBig += 40 * aiBrain.momentum.weight;

logic.push("Momentum Engine → BIG");

usedStrategies.push({
name:"momentum",
prediction:"BIG"
});

}else{

scoreSmall += 40 * aiBrain.momentum.weight;

logic.push("Momentum Engine → SMALL");

usedStrategies.push({
name:"momentum",
prediction:"SMALL"
});

}

}


// ================= REVERSAL =================

if(streak >= 5){

if(recent[0] === "BIG"){

scoreSmall += 55 * aiBrain.reversal.weight;

logic.push("Reversal Engine → SMALL");

usedStrategies.push({
name:"reversal",
prediction:"SMALL"
});

}else{

scoreBig += 55 * aiBrain.reversal.weight;

logic.push("Reversal Engine → BIG");

usedStrategies.push({
name:"reversal",
prediction:"BIG"
});

}

}


// ================= PATTERN =================

let patterns = {};

for(let i=0;i<recent.length-4;i++){

let key =
recent[i] +
recent[i+1] +
recent[i+2];

let next = recent[i+3];

if(!patterns[key]){

patterns[key] = {
BIG:0,
SMALL:0
};

}

patterns[key][next]++;

}

let currentPattern =
recent[0] +
recent[1] +
recent[2];

if(patterns[currentPattern]){

let p = patterns[currentPattern];

if(p.BIG > p.SMALL){

scoreBig += 35 * aiBrain.pattern.weight;

logic.push("Pattern AI → BIG");

usedStrategies.push({
name:"pattern",
prediction:"BIG"
});

}else{

scoreSmall += 35 * aiBrain.pattern.weight;

logic.push("Pattern AI → SMALL");

usedStrategies.push({
name:"pattern",
prediction:"SMALL"
});

}

}


// ================= VOLATILITY =================

let changes = 0;

for(let i=0;i<recent.length-1;i++){

if(recent[i] !== recent[i+1]){

changes++;

}

}

let volatility =
(changes/recent.length)*100;

if(volatility < 35){

if(recent[0] === "BIG"){

scoreBig += 25 * aiBrain.volatility.weight;

logic.push("Stable Market → BIG");

usedStrategies.push({
name:"volatility",
prediction:"BIG"
});

}else{

scoreSmall += 25 * aiBrain.volatility.weight;

logic.push("Stable Market → SMALL");

usedStrategies.push({
name:"volatility",
prediction:"SMALL"
});

}

}


// ================= MACHINE LEARNING =================

let machineScore = 0;

recent.forEach((r,index)=>{

if(r==="BIG"){

machineScore += (25-index);

}else{

machineScore -= (25-index);

}

});

if(machineScore > 0){

scoreBig += 50 * aiBrain.machine.weight;

logic.push("Neural AI → BIG");

usedStrategies.push({
name:"machine",
prediction:"BIG"
});

}else{

scoreSmall += 50 * aiBrain.machine.weight;

logic.push("Neural AI → SMALL");

usedStrategies.push({
name:"machine",
prediction:"SMALL"
});

}


// ================= FINAL =================

let prediction =
scoreBig > scoreSmall
? "BIG"
: "SMALL";

let total =
scoreBig + scoreSmall;

let confidence =
Math.floor(
(Math.max(scoreBig,scoreSmall)
/
total) * 100
);

if(confidence > 98){

confidence = 98;

}

let trend =
prediction === "BIG"
? "STRONG BIG"
: "STRONG SMALL";

let risk = "MEDIUM";

if(volatility > 70){

risk = "HIGH";
confidence -= 10;
}

if(volatility < 35){

risk = "LOW";

}

let brainPower = Math.floor(

(
aiBrain.trend.weight +
aiBrain.momentum.weight +
aiBrain.reversal.weight +
aiBrain.pattern.weight +
aiBrain.volatility.weight +
aiBrain.machine.weight
)/6*100

);

return {

prediction,
confidence,
trend,
risk,
logic,
usedStrategies,
brainPower

};

}


// ================= LOAD =================

async function loadData(){

try{

document.getElementById("periodStatus")
.innerText = "Quantum AI Scanning...";

const response = await fetch(API_URL);

const data = await response.json();

const history = data.data.list;

const currentPeriod =
history[0].issueNumber;

let results = [];

history.forEach(item=>{

results.push(
getBigSmall(item.number)
);

});

const analysis =
analyze(results);


// ================= UI =================

document.getElementById("prediction")
.innerText =
analysis.prediction;

document.getElementById("prediction")
.className =
analysis.prediction === "BIG"
? "value big"
: "value small";

document.getElementById("confidence")
.innerText =
analysis.confidence + "%";

document.getElementById("trend")
.innerText =
analysis.trend;

document.getElementById("risk")
.innerText =
analysis.risk;

document.getElementById("brainPower")
.innerText =
"Brain Power: " +
analysis.brainPower + "%";

document.getElementById("logicBox")
.innerHTML =
analysis.logic.map(x=>
`<div>• ${x}</div>`
).join("");

document.getElementById("periodStatus")
.innerText =
"Current Period: " +
currentPeriod;

document.getElementById("accuracyBar")
.style.width =
analysis.confidence + "%";

document.getElementById("aiStatus")
.innerHTML = `
AI Neural Network Active<br>
Prediction Confidence:
${analysis.confidence}%<br>
Market Volatility:
${analysis.risk}<br>
Realtime Adaptive Learning Enabled
`;

renderRecent(history);


// ================= RESULT CHECK =================

if(
lastPeriod &&
currentPeriod !== lastPeriod &&
pendingSignal
){

const actual =
getBigSmall(history[0].number);

const status =
actual === pendingSignal.prediction
? "PROFIT"
: "LOSS";

pendingSignal.usedStrategies
.forEach(strategy=>{

let win =
strategy.prediction === actual;

updateBrain(
strategy.name,
win
);

});

signalHistory.unshift({

period:currentPeriod,
prediction:pendingSignal.prediction,
actual,
confidence:pendingSignal.confidence,
status,
time:new Date().toLocaleTimeString()

});

localStorage.setItem(
"signalHistory",
JSON.stringify(signalHistory)
);

renderHistory();

}

pendingSignal = {

prediction:
analysis.prediction,

confidence:
analysis.confidence,

usedStrategies:
analysis.usedStrategies

};

lastPeriod = currentPeriod;

}catch(error){

console.log(error);

document.getElementById("periodStatus")
.innerText =
"API Error Or CORS Block";

}

}


// ================= RECENT =================

function renderRecent(history){

const box =
document.getElementById("recentResults");

box.innerHTML = "";

history.slice(0,12)
.forEach(item=>{

const type =
getBigSmall(item.number);

box.innerHTML += `

<div class="recent-item ${
type === 'BIG'
? 'green-circle'
: 'red-circle'
}">
${item.number}
</div>

`;

});

}


// ================= HISTORY =================

function renderHistory(){

const historyBox =
document.getElementById("history");

historyBox.innerHTML = "";

signalHistory.slice(0,20)
.forEach(item=>{

historyBox.innerHTML += `

<div class="history-item">

<div>
<b>${item.time}</b><br>
${item.period}
</div>

<div>
Signal<br>
<b class="${
item.prediction === 'BIG'
? 'profit'
: 'loss'
}">
${item.prediction}
</b>
</div>

<div>
Actual<br>
<b class="${
item.actual === 'BIG'
? 'profit'
: 'loss'
}">
${item.actual}
</b>
</div>

<div>
Confidence<br>
${item.confidence}%
</div>

<div>
<span class="badge ${
item.status === 'PROFIT'
? 'green'
: 'red'
}">
${item.status}
</span>
</div>

</div>

`;

});

}

renderHistory();
loadData();

setInterval(loadData,30000);

</script>

</body>
    </html>
